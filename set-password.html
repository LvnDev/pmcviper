<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMC VIPER — Set Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --black:#070707;--dark:#0e0e0e;--card:#131313;
      --red:#C0312A;--red-d:#9A2820;--red-glow:rgba(192,49,42,0.10);
      --green:#2a9a5a;--green-glow:rgba(42,154,90,0.10);
      --white:#F0F0F0;--grey:#8A8A8A;--grey-d:#404040;
      --border:rgba(255,255,255,0.07);--border-r:rgba(192,49,42,0.30);
      --font-d:"Bebas Neue",sans-serif;--font-c:"Barlow Condensed",sans-serif;--font-b:"Barlow",sans-serif;
    }
    body{background:var(--black);color:var(--white);font-family:var(--font-b);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(192,49,42,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(192,49,42,.025) 1px,transparent 1px);background-size:56px 56px;pointer-events:none}
    .bg-glow{position:fixed;bottom:-20%;left:50%;transform:translateX(-50%);width:80vw;height:60vw;background:radial-gradient(ellipse at center,rgba(192,49,42,.12) 0%,transparent 68%);pointer-events:none}
    .wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:24px}
    .card{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--red);padding:40px 36px}
    .logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px}
    .logo-row img{width:44px;height:44px;object-fit:contain}
    .logo-txt{font-family:var(--font-d);font-size:24px;letter-spacing:.06em}
    .logo-txt em{color:var(--red);font-style:normal}
    .welcome{text-align:center;margin-bottom:28px}
    .welcome-tag{font-family:var(--font-c);font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:6px}
    .welcome h2{font-family:var(--font-c);font-size:24px;font-weight:700;margin-bottom:6px}
    .welcome p{font-size:13px;color:var(--grey);line-height:1.6}
    .divider{height:1px;background:var(--border);margin:24px 0}
    .field{margin-bottom:20px}
    .field label{display:block;font-family:var(--font-c);font-size:12px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--grey);margin-bottom:8px}
    .input-wrap{position:relative}
    .field input{width:100%;background:var(--dark);border:1px solid var(--border);color:var(--white);font-family:var(--font-b);font-size:15px;padding:12px 42px 12px 14px;outline:none;transition:border-color .2s}
    .field input:focus{border-color:var(--red)}
    .field input.valid{border-color:var(--green)}
    .field input::placeholder{color:var(--grey-d)}
    .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--grey);padding:4px;transition:color .2s}
    .toggle-pw:hover{color:var(--white)}
    .toggle-pw svg{width:17px;height:17px;display:block}

    /* Strength bar */
    .strength-bar{margin-top:8px}
    .strength-track{height:3px;background:var(--border);display:flex;gap:3px;margin-bottom:6px}
    .strength-seg{flex:1;height:100%;background:var(--grey-d);transition:background .3s}
    .strength-seg.active-1{background:#e74c3c}
    .strength-seg.active-2{background:#e67e22}
    .strength-seg.active-3{background:#f1c40f}
    .strength-seg.active-4{background:var(--green)}
    .strength-label{font-family:var(--font-c);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey)}

    /* Requirements */
    .reqs{margin-top:12px;display:flex;flex-direction:column;gap:5px}
    .req{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--grey)}
    .req svg{width:14px;height:14px;flex-shrink:0;color:var(--grey-d);transition:color .2s}
    .req.met{color:var(--white)}
    .req.met svg{color:var(--green)}

    .error-box{background:rgba(192,49,42,.12);border:1px solid var(--border-r);padding:12px 16px;font-size:13px;color:#ff6b6b;margin-bottom:20px;display:none}
    .error-box.show{display:block}
    .success-box{background:rgba(42,154,90,.12);border:1px solid rgba(42,154,90,.3);padding:12px 16px;font-size:13px;color:#5dde93;margin-bottom:20px;display:none;text-align:center}
    .success-box.show{display:block}

    .btn{width:100%;padding:14px;background:var(--red);color:#fff;font-family:var(--font-c);font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s,transform .2s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);margin-top:4px}
    .btn:hover:not(:disabled){background:var(--red-d);transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn.loading{position:relative;color:transparent}
    .btn.loading::after{content:"";position:absolute;inset:0;margin:auto;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="wrap">
    <div class="card">
      <div class="logo-row">
        <img src="images/logo.webp" alt="PMC Viper">
        <span class="logo-txt">PMC <em>VIPER</em></span>
      </div>
      <div class="welcome">
        <div class="welcome-tag">Welcome, Operator</div>
        <h2 id="welcomeName">Set Your Password</h2>
        <p>This is your first login. Create a secure password to access your account.</p>
      </div>
      <div class="divider"></div>

      <div class="error-box" id="errorBox"></div>
      <div class="success-box" id="successBox">Password set successfully. Redirecting...</div>

      <div class="field">
        <label>New Password</label>
        <div class="input-wrap">
          <input type="password" id="pw1" placeholder="Create a strong password">
          <button class="toggle-pw" id="toggle1" type="button" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar">
          <div class="strength-track">
            <div class="strength-seg" id="s1"></div>
            <div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div>
            <div class="strength-seg" id="s4"></div>
          </div>
          <div class="strength-label" id="strengthLabel">Enter a password</div>
        </div>
        <div class="reqs">
          <div class="req" id="req-len">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
            At least 8 characters
          </div>
          <div class="req" id="req-upper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
            One uppercase letter
          </div>
          <div class="req" id="req-num">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
            One number
          </div>
          <div class="req" id="req-special">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
            One special character
          </div>
        </div>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="pw2" placeholder="Repeat your password">
          <button class="toggle-pw" id="toggle2" type="button" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn" id="setBtn" disabled>Set Password &amp; Continue</button>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://laqzobkdxunrgqaaixcl.supabase.co',
      'sb_publishable_6_mVXuUQQiqmee3-qnl_Og_cgOnNrCh'
    );

    const pw1      = document.getElementById('pw1');
    const pw2      = document.getElementById('pw2');
    const setBtn   = document.getElementById('setBtn');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');

    const CHECK_SVG = '<polyline points="20,6 9,17 4,12"/>';
    const CIRCLE_SVG = '<circle cx="12" cy="12" r="10"/>';

    const checks = {
      len:     { el: document.getElementById('req-len'),     test: v => v.length >= 8 },
      upper:   { el: document.getElementById('req-upper'),   test: v => /[A-Z]/.test(v) },
      num:     { el: document.getElementById('req-num'),     test: v => /[0-9]/.test(v) },
      special: { el: document.getElementById('req-special'), test: v => /[^A-Za-z0-9]/.test(v) },
    };

    const strengthLabels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    const strengthColors  = ['', 'active-1', 'active-2', 'active-3', 'active-4'];

    function updateStrength(val) {
      const score = Object.values(checks).filter(c => c.test(val)).length;
      [1,2,3,4].forEach(i => {
        const seg = document.getElementById('s' + i);
        seg.className = 'strength-seg' + (i <= score ? ' ' + strengthColors[score] : '');
      });
      document.getElementById('strengthLabel').textContent = val ? strengthLabels[score] : 'Enter a password';
    }

    function updateReqs(val) {
      let allMet = true;
      Object.entries(checks).forEach(([, c]) => {
        const met = c.test(val);
        c.el.classList.toggle('met', met);
        c.el.querySelector('svg').innerHTML = met ? CHECK_SVG : CIRCLE_SVG;
        if (!met) allMet = false;
      });
      return allMet;
    }

    function validate() {
      const val  = pw1.value;
      const val2 = pw2.value;
      const reqs = updateReqs(val);
      updateStrength(val);
      const match = val && val === val2;
      pw2.classList.toggle('valid', match);
      setBtn.disabled = !(reqs && match);
    }

    pw1.addEventListener('input', validate);
    pw2.addEventListener('input', validate);

    // Toggle visibility
    function makeToggle(btn, input) {
      btn.addEventListener('click', () => {
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.querySelector('svg').innerHTML = show
          ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
          : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      });
    }
    makeToggle(document.getElementById('toggle1'), pw1);
    makeToggle(document.getElementById('toggle2'), pw2);

    // Guard — must be logged in and first_login true
    let currentUser = null;
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      currentUser = session.user;

      const { data: profile } = await sb.from('profiles')
        .select('display_name, first_login, is_admin')
        .eq('id', currentUser.id)
        .single();

      if (!profile?.first_login) {
        window.location.href = profile?.is_admin ? 'admin.html' : 'portal.html';
        return;
      }

      if (profile.display_name) {
        document.getElementById('welcomeName').textContent = 'Welcome, ' + profile.display_name;
      }
    })();

    setBtn.addEventListener('click', async () => {
      if (!currentUser) return;
      errorBox.classList.remove('show');
      setBtn.classList.add('loading');
      setBtn.disabled = true;

      try {
        // Update password
        const { error: pwErr } = await sb.auth.updateUser({ password: pw1.value });
        if (pwErr) { errorBox.textContent = pwErr.message; errorBox.classList.add('show'); return; }

        // Mark first_login complete
        await sb.from('profiles').update({ first_login: false }).eq('id', currentUser.id);

        // Show success then redirect
        successBox.classList.add('show');

        const { data: profile } = await sb.from('profiles')
          .select('is_admin').eq('id', currentUser.id).single();

        setTimeout(() => {
          window.location.href = profile?.is_admin ? 'admin.html' : 'portal.html';
        }, 1800);

      } catch (err) {
        errorBox.textContent = 'Something went wrong. Please try again.';
        errorBox.classList.add('show');
        console.error(err);
      } finally {
        setBtn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
