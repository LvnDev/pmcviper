<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMC VIPER — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --black:#070707;--dark:#0e0e0e;--card:#131313;--card-h:#1a1a1a;
      --red:#C0312A;--red-d:#9A2820;--red-glow:rgba(192,49,42,0.10);
      --white:#F0F0F0;--grey:#8A8A8A;--grey-d:#404040;
      --border:rgba(255,255,255,0.07);--border-r:rgba(192,49,42,0.30);
      --font-d:"Bebas Neue",sans-serif;--font-c:"Barlow Condensed",sans-serif;--font-b:"Barlow",sans-serif;
    }
    body{background:var(--black);color:var(--white);font-family:var(--font-b);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(192,49,42,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(192,49,42,.025) 1px,transparent 1px);background-size:56px 56px;pointer-events:none}
    .bg-glow{position:fixed;bottom:-20%;left:50%;transform:translateX(-50%);width:80vw;height:60vw;background:radial-gradient(ellipse at center,rgba(192,49,42,.12) 0%,transparent 68%);pointer-events:none}
    .wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:24px}
    .back{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-c);font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);text-decoration:none;margin-bottom:32px;transition:color .2s}
    .back:hover{color:var(--white)}
    .back svg{width:16px;height:16px}
    .card{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--red);padding:40px 36px}
    .logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px}
    .logo-row img{width:48px;height:48px;object-fit:contain}
    .logo-txt{font-family:var(--font-d);font-size:26px;letter-spacing:.06em}
    .logo-txt em{color:var(--red);font-style:normal}
    .card-title{font-family:var(--font-c);font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
    .card-sub{font-size:13px;color:var(--grey);text-align:center;margin-bottom:32px}
    .field{margin-bottom:20px}
    .field label{display:block;font-family:var(--font-c);font-size:12px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--grey);margin-bottom:8px}
    .field input{width:100%;background:var(--dark);border:1px solid var(--border);color:var(--white);font-family:var(--font-b);font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s}
    .field input:focus{border-color:var(--red)}
    .field input::placeholder{color:var(--grey-d)}
    .field .input-wrap{position:relative}
    .field .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--grey);padding:4px;transition:color .2s}
    .field .toggle-pw:hover{color:var(--white)}
    .field .toggle-pw svg{width:18px;height:18px;display:block}
    .error-box{background:rgba(192,49,42,.12);border:1px solid var(--border-r);padding:12px 16px;font-size:13px;color:#ff6b6b;margin-bottom:20px;display:none}
    .error-box.show{display:block}
    .btn{width:100%;padding:14px;background:var(--red);color:#fff;font-family:var(--font-c);font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s,transform .2s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);margin-top:4px}
    .btn:hover:not(:disabled){background:var(--red-d);transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn.loading{position:relative;color:transparent}
    .btn.loading::after{content:"";position:absolute;inset:0;margin:auto;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .divider{height:1px;background:var(--border);margin:28px 0}
    .footer-note{text-align:center;font-size:12px;color:var(--grey-d)}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="wrap">
    <a href="index.html" class="back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="10,3 5,8 10,13"/></svg>
      Back to site
    </a>
    <div class="card">
      <div class="logo-row">
        <img src="images/logo.webp" alt="PMC Viper">
        <span class="logo-txt">PMC <em>VIPER</em></span>
      </div>
      <div class="card-title">Member Login</div>
      <div class="card-sub">Enter your credentials to access the portal</div>
      <div class="divider"></div>
      <div class="error-box" id="errorBox"></div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
          <button class="toggle-pw" id="togglePw" type="button" tabindex="-1">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn" id="loginBtn">Sign In</button>
      <div class="divider"></div>
      <div class="footer-note">Account access is by invitation only.<br>Contact an admin if you need access.</div>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://laqzobkdxunrgqaaixcl.supabase.co',
      'sb_publishable_6_mVXuUQQiqmee3-qnl_Og_cgOnNrCh'
    );

    const loginBtn = document.getElementById('loginBtn');
    const errorBox = document.getElementById('errorBox');
    const togglePw  = document.getElementById('togglePw');
    const pwInput   = document.getElementById('password');
    const eyeIcon   = document.getElementById('eyeIcon');

    // Show/hide password
    togglePw.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      eyeIcon.innerHTML = show
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    // Allow Enter key to submit
    document.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    }
    function hideError() { errorBox.classList.remove('show'); }

    loginBtn.addEventListener('click', async () => {
      hideError();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) { showError('Please enter your username and password.'); return; }

      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      try {
        // Step 1 — get email from username
        const { data: email, error: fnErr } = await sb.rpc('get_email_by_username', { p_username: username });
        if (fnErr || !email) { showError('Username not found. Check your username and try again.'); return; }

        // Step 2 — sign in
        const { data: authData, error: authErr } = await sb.auth.signInWithPassword({ email, password });
        if (authErr) {
          if (authErr.message.includes('Invalid login')) showError('Incorrect password. Please try again.');
          else showError(authErr.message);
          return;
        }

        // Step 3 — check first_login and role
        const { data: profile } = await sb
          .from('profiles')
          .select('first_login, is_admin')
          .eq('id', authData.user.id)
          .single();

        if (profile.first_login) {
          window.location.href = 'set-password.html';
        } else if (profile.is_admin) {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'portal.html';
        }

      } catch (err) {
        showError('Something went wrong. Please try again.');
        console.error(err);
      } finally {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
      }
    });

    // If already logged in, redirect
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const { data: profile } = await sb.from('profiles').select('first_login, is_admin').eq('id', session.user.id).single();
        if (profile?.first_login) window.location.href = 'set-password.html';
        else if (profile?.is_admin) window.location.href = 'admin.html';
        else window.location.href = 'portal.html';
      }
    })();
  </script>
</body>
</html>
